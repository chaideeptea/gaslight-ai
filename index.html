<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swipe Deck Lite</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { background: #111; overflow: hidden; margin: 0; }
.card-container { perspective: 1000px; }
.card {
  width: 300px;
  height: 400px;
  position: absolute;
  border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: white;
  cursor: grab;
  user-select: none;
  touch-action: none;
}
.card.dragging {
  cursor: grabbing;
}
</style>
</head>
<body>
<div id="root"></div>
<script>
const { useState, useRef, useEffect } = React;

const INITIAL_CARDS = [
  { id: 1, text: "Explore the Mountains", color: "bg-emerald-500", img: "🏔" },
  { id: 2, text: "Dive into the Ocean", color: "bg-blue-500", img: "🌊" },
  { id: 3, text: "Urban Jungle Life", color: "bg-orange-500", img: "🏙" },
  { id: 4, text: "Starlit Desert Nights", color: "bg-purple-600", img: "🌵" }
];

const Card = ({ card, removeCard, isTop }) => {
  const cardRef = useRef(null);
  const [isDragging, setIsDragging] = useState(false);
  const [offset, setOffset] = useState({ x: 0, y: 0 });
  const startPos = useRef(null);

  const handleStart = (e) => {
    if (!isTop) return;
    
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    
    setIsDragging(true);
    startPos.current = { x: clientX, y: clientY };
  };

  const handleMove = (e) => {
    if (!isDragging || !startPos.current) return;
    
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    
    const dx = clientX - startPos.current.x;
    const dy = clientY - startPos.current.y;
    
    setOffset({ x: dx, y: dy });
  };

  const handleEnd = () => {
    if (!isDragging) return;
    setIsDragging(false);
    
    // Check if swiped far enough (more than 50px)
    if (Math.abs(offset.x) > 50) {
      removeCard(card.id, offset.x > 0 ? "right" : "left");
    } else {
      // Snap back if not far enough
      setOffset({ x: 0, y: 0 });
    }
    startPos.current = null;
  };

  useEffect(() => {
    const cardElement = cardRef.current;
    if (!cardElement) return;

    cardElement.addEventListener('mousedown', handleStart);
    cardElement.addEventListener('touchstart', handleStart);
    document.addEventListener('mousemove', handleMove);
    document.addEventListener('touchmove', handleMove);
    document.addEventListener('mouseup', handleEnd);
    document.addEventListener('touchend', handleEnd);

    return () => {
      cardElement.removeEventListener('mousedown', handleStart);
      cardElement.removeEventListener('touchstart', handleStart);
      document.removeEventListener('mousemove', handleMove);
      document.removeEventListener('touchmove', handleMove);
      document.removeEventListener('mouseup', handleEnd);
      document.removeEventListener('touchend', handleEnd);
    };
  }, [isDragging, offset]);

  const rotation = (offset.x / 100) * 25;
  const opacity = Math.max(0, 1 - Math.abs(offset.x) / 200);

  return React.createElement('div', {
    ref: cardRef,
    className: `card ${card.color}`,
    style: {
      transform: `translateX(${offset.x}px) translateY(${offset.y}px) rotate(${rotation}deg)`,
      opacity: opacity,
      zIndex: isTop ? 10 : 1,
      transition: isDragging ? 'none' : 'all 0.3s ease-out'
    }
  },
    React.createElement('span', { style: { fontSize: '60px', marginBottom: '20px' } }, card.img),
    React.createElement('h2', { style: { fontSize: '24px', fontWeight: 'bold', textAlign: 'center', margin: '0 20px' } }, card.text)
  );
};

const App = () => {
  const [cards, setCards] = useState(INITIAL_CARDS);

  const removeCard = (id, direction) => {
    console.log(`Swiped ${direction} on card ${id}`);
    setCards((prev) => prev.filter((card) => card.id !== id));
  };

  return React.createElement('div', {
    style: {
      display: 'flex',
      flexDirection: 'column',
      alignItems: 'center',
      justifyContent: 'center',
      height: '100vh',
      overflow: 'hidden'
    }
  },
    React.createElement('div', {
      style: {
        marginBottom: '30px',
        textAlign: 'center'
      }
    },
      React.createElement('h1', {
        style: {
          color: 'white',
          fontSize: '36px',
          fontWeight: 'bold',
          margin: '0',
          letterSpacing: '2px'
        }
      }, 'SWIPE DECK'),
      React.createElement('p', {
        style: { color: '#888', margin: '10px 0 0 0', fontSize: '14px' }
      }, 'Drag left to skip • Drag right to like')
    ),
    React.createElement('div', {
      className: 'card-container',
      style: {
        position: 'relative',
        width: '300px',
        height: '400px'
      }
    },
      cards.map((card, index) =>
        React.createElement(Card, {
          key: card.id,
          card: card,
          removeCard: removeCard,
          isTop: index === cards.length - 1
        })
      ),
      cards.length === 0 && React.createElement('button', {
        onClick: () => setCards(INITIAL_CARDS),
        style: {
          backgroundColor: 'white',
          color: 'black',
          padding: '12px 24px',
          borderRadius: '50px',
          fontWeight: 'bold',
          border: 'none',
          cursor: 'pointer',
          fontSize: '16px'
        }
      }, 'Reset Deck')
    )
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
