<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Scroll</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { background: #111; margin: 0; overflow: hidden; }
html { overflow: hidden; }
#root {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}
.scroll-container {
  display: flex;
  overflow-x: auto;
  scroll-behavior: smooth;
  gap: 0;
  padding: 0;
  -webkit-overflow-scrolling: touch;
  width: 100%;
  height: 100%;
  scroll-snap-type: x mandatory;
}
.scroll-container::-webkit-scrollbar {
  display: none;
}
.card {
  flex-shrink: 0;
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: white;
  user-select: none;
  scroll-snap-align: start;
}
.card-content {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
}
</style>
</head>
<body>
<div id="root"></div>
<script>
const { useState, useRef } = React;

const INITIAL_CARDS = [
  { id: 1, text: "Explore the Mountains", color: "bg-emerald-500", img: "🏔" },
  { id: 2, text: "Dive into the Ocean", color: "bg-blue-500", img: "🌊" },
  { id: 3, text: "Urban Jungle Life", color: "bg-orange-500", img: "🏙" },
  { id: 4, text: "Starlit Desert Nights", color: "bg-purple-600", img: "🌵" },
  { id: 5, text: "Forest Adventure", color: "bg-green-600", img: "🌲" },
  { id: 6, text: "Beach Sunset", color: "bg-pink-500", img: "🏖" },
  { id: 7, text: "City Lights", color: "bg-indigo-600", img: "🌃" },
  { id: 8, text: "Snowy Peaks", color: "bg-sky-300", img: "❄" }
];

const Card = ({ card }) => {
  return React.createElement('div', {
    className: `card ${card.color}`,
  },
    React.createElement('div', {
      className: 'card-content'
    },
      React.createElement('span', { style: { fontSize: '120px' } }, card.img),
      React.createElement('h2', { style: { fontSize: '48px', fontWeight: 'bold', textAlign: 'center', margin: '0', maxWidth: '80%' } }, card.text)
    )
  );
};

const App = () => {
  const [cards] = useState(INITIAL_CARDS);
  const scrollContainerRef = useRef(null);

  return React.createElement('div', {
    style: {
      width: '100vw',
      height: '100vh',
      overflow: 'hidden'
    }
  },
    React.createElement('div', {
      ref: scrollContainerRef,
      className: 'scroll-container'
    },
      cards.map((card) =>
        React.createElement(Card, {
          key: card.id,
          card: card
        })
      )
    )
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
