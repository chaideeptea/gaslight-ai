<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Scroll</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { background: #111; margin: 0; overflow: hidden; }
.scroll-container {
  display: flex;
  overflow-x: auto;
  scroll-behavior: smooth;
  gap: 20px;
  padding: 20px;
  -webkit-overflow-scrolling: touch;
}
.scroll-container::-webkit-scrollbar {
  height: 8px;
}
.scroll-container::-webkit-scrollbar-track {
  background: #222;
}
.scroll-container::-webkit-scrollbar-thumb {
  background: #666;
  border-radius: 4px;
}
.card {
  flex-shrink: 0;
  width: 300px;
  height: 400px;
  border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: white;
  user-select: none;
}
</style>
</head>
<body>
<div id="root"></div>
<script>
const { useState, useRef } = React;

const INITIAL_CARDS = [
  { id: 1, text: "Explore the Mountains", color: "bg-emerald-500", img: "🏔" },
  { id: 2, text: "Dive into the Ocean", color: "bg-blue-500", img: "🌊" },
  { id: 3, text: "Urban Jungle Life", color: "bg-orange-500", img: "🏙" },
  { id: 4, text: "Starlit Desert Nights", color: "bg-purple-600", img: "🌵" },
  { id: 5, text: "Forest Adventure", color: "bg-green-600", img: "🌲" },
  { id: 6, text: "Beach Sunset", color: "bg-pink-500", img: "🏖" },
  { id: 7, text: "City Lights", color: "bg-indigo-600", img: "🌃" },
  { id: 8, text: "Snowy Peaks", color: "bg-sky-300", img: "❄" }
];

const Card = ({ card }) => {
  return React.createElement('div', {
    className: `card ${card.color}`,
    style: {
      flex: '0 0 auto'
    }
  },
    React.createElement('span', { style: { fontSize: '60px', marginBottom: '20px' } }, card.img),
    React.createElement('h2', { style: { fontSize: '20px', fontWeight: 'bold', textAlign: 'center', margin: '0 20px' } }, card.text)
  );
};

const App = () => {
  const [cards] = useState(INITIAL_CARDS);
  const scrollContainerRef = useRef(null);

  const scroll = (direction) => {
    if (scrollContainerRef.current) {
      const scrollAmount = 340; // card width + gap
      scrollContainerRef.current.scrollBy({
        left: direction === 'right' ? scrollAmount : -scrollAmount,
        behavior: 'smooth'
      });
    }
  };

  return React.createElement('div', {
    style: {
      display: 'flex',
      flexDirection: 'column',
      alignItems: 'center',
      justifyContent: 'center',
      height: '100vh',
      overflow: 'hidden'
    }
  },
    React.createElement('div', {
      style: {
        marginBottom: '20px',
        textAlign: 'center'
      }
    },
      React.createElement('h1', {
        style: {
          color: 'white',
          fontSize: '36px',
          fontWeight: 'bold',
          margin: '0',
          letterSpacing: '2px'
        }
      }, 'CARD SCROLL'),
      React.createElement('p', {
        style: { color: '#888', margin: '10px 0 0 0', fontSize: '14px' }
      }, 'Scroll left or right to explore')
    ),
    React.createElement('div', {
      style: {
        position: 'relative',
        width: '100%',
        display: 'flex',
        alignItems: 'center',
        gap: '20px'
      }
    },
      React.createElement('button', {
        onClick: () => scroll('left'),
        style: {
          backgroundColor: 'rgba(255, 255, 255, 0.2)',
          color: 'white',
          border: 'none',
          width: '50px',
          height: '50px',
          borderRadius: '50%',
          cursor: 'pointer',
          fontSize: '24px',
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
          zIndex: 10,
          flexShrink: 0
        }
      }, '←'),
      React.createElement('div', {
        ref: scrollContainerRef,
        className: 'scroll-container',
        style: {
          flex: 1,
          overflow: 'hidden'
        }
      },
        cards.map((card) =>
          React.createElement(Card, {
            key: card.id,
            card: card
          })
        )
      ),
      React.createElement('button', {
        onClick: () => scroll('right'),
        style: {
          backgroundColor: 'rgba(255, 255, 255, 0.2)',
          color: 'white',
          border: 'none',
          width: '50px',
          height: '50px',
          borderRadius: '50%',
          cursor: 'pointer',
          fontSize: '24px',
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
          zIndex: 10,
          flexShrink: 0
        }
      }, '→')
    )
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
